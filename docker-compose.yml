services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: presenca_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: presenca_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_PATH=${DATABASE_PATH:-./data/presenca.db}
      - JWT_SECRET=${JWT_SECRET:-chave-padrao-trocar-em-producao}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data: